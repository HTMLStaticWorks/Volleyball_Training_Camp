<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Log in to your Spike Volleyball Academy account to access camp registration details and recruiting files.">
  <title>Login | Spike Academy Athlete Portal</title>
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="assets/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
  <script src="assets/js/theme-toggle.js"></script>
  <script src="assets/js/rtl-toggle.js"></script>
</head>
<body>

  <!-- Auth Layout Wrapper -->
  <div class="auth-wrapper">
    <!-- Top Action Controls (Theme, RTL) -->
    <div class="auth-top-actions">
      <button class="theme-switch-btn" aria-label="Toggle Theme"></button>
      <button class="rtl-switch-btn" aria-label="Toggle RTL">RTL</button>
    </div>

    <div class="auth-card">
      <div class="auth-header">
        <a href="index.html" class="auth-logo brand-logo">
          <svg class="brand-logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10" />
            <path d="M2 12a15.3 15.3 0 0 1 10-4 15.3 15.3 0 0 1 10 4" />
          </svg>
          SPIKE<span>ACADEMY</span>
        </a>
        <h1 class="auth-title text-uppercase font-headings">Athlete Portal</h1>
        <p class="auth-subtitle">Log in to view camp registrations and metrics.</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control-camp" placeholder="athlete@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="password-field-wrapper">
            <input type="password" class="form-control-camp" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="password-toggle-btn" aria-label="Toggle Password Visibility">
              <!-- Eye Open Icon -->
              <svg class="eye-icon eye-open" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.43 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              </svg>
              <!-- Eye Closed Icon (Hidden Initially) -->
              <svg class="eye-icon eye-closed" viewBox="0 0 24 24" style="display: none;">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
              </svg>
            </button>
          </div>
        </div>

        <div class="form-check-group">
          <div class="form-check">
            <input type="checkbox" class="form-check-input" id="rememberMe">
            <label class="text-secondary" style="font-size: 0.85rem;" for="rememberMe">Remember me</label>
          </div>
          <a href="#" class="auth-link" style="font-size: 0.85rem;">Forgot password?</a>
        </div>

        <button type="submit" class="btn-custom btn-primary-camp btn-auth">Sign In</button>
      </form>

      <!-- Social Sign In Divider -->
      <div class="auth-divider">
        <span>Or continue with</span>
      </div>

      <!-- Social Sign In Buttons -->
      <div class="social-auth-group">
        <a href="#" class="social-auth-btn google-btn">
          <!-- Google Original SVG -->
          <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4" />
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853" />
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05" />
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335" />
          </svg>
          Google
        </a>
        <a href="#" class="social-auth-btn apple-btn">
          <!-- Apple Original SVG -->
          <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-.96.04-2.13.64-2.82 1.45-.6.69-1.12 1.83-.98 2.94.13.06.32.09.43.09.87 0 1.94-.58 2.38-1.42z" />
          </svg>
          Apple
        </a>
      </div>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html" class="auth-link">Register Athlete</a>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="assets/js/main.js"></script>
</body>
</html>
